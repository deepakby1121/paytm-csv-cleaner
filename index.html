<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paytm XLSX Cleaner</title>

<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}
button {
    padding: 10px 18px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>Paytm Side-by-Side XLSX Cleaner</h2>

<input type="file" id="csvFile" accept=".csv">
<br><br>
<button onclick="processCSV()">Clean & Download XLSX</button>

<script>
function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);

    return lines.map(line => {
        const result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];

            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }

        result.push(current);
        return result;
    });
}

function cleanText(value) {
    if (!value) return '';
    return value.replace(/^'+|'+$/g, '').trim();
}

function formatDate(dateStr) {
    try {
        const clean = cleanText(dateStr);
        const date = new Date(clean.replace(' ', 'T'));

        if (isNaN(date)) return clean;

        return date.toLocaleString('en-IN', {
            year: 'numeric',
            month: 'short',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
        });
    } catch {
        return dateStr;
    }
}

async function processCSV() {
    const fileInput = document.getElementById('csvFile');

    if (!fileInput.files.length) {
        alert('Please choose a CSV file.');
        return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function(e) {
        const csvText = e.target.result;
        const rows = parseCSV(csvText);

        const headers = rows[0];
        const dataRows = rows.slice(1);

        const idxDate = headers.indexOf('Transaction_Date');
        const idxPos = headers.indexOf('POS_ID');
        const idxAmount = headers.indexOf('Amount');

        if (idxDate === -1 || idxPos === -1 || idxAmount === -1) {
            alert('Required columns not found.');
            return;
        }

        const pump1 = [];
        const pump2 = [];

        dataRows.forEach(row => {
            const obj = {
                dateRaw: cleanText(row[idxDate]),
                date: formatDate(row[idxDate]),
                pos: cleanText(row[idxPos]),
                amount: cleanText(row[idxAmount])
            };

            if (obj.pos === 'PUMP-01') {
                pump1.push(obj);
            } else if (obj.pos === 'PUMP-02') {
                pump2.push(obj);
            }
        });

        const sortFn = (a, b) => new Date(a.dateRaw) - new Date(b.dateRaw);

        pump1.sort(sortFn);
        pump2.sort(sortFn);

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Paytm Report');

        worksheet.columns = [
            { header: 'P1_Transaction_Date', width: 28 },
            { header: 'P1_POS_ID', width: 15 },
            { header: 'P1_Amount', width: 15 },

            { header: '', width: 4 },

            { header: 'P2_Transaction_Date', width: 28 },
            { header: 'P2_POS_ID', width: 15 },
            { header: 'P2_Amount', width: 15 }
        ];

        const maxLen = Math.max(pump1.length, pump2.length);

        for (let i = 0; i < maxLen; i++) {
            const p1 = pump1[i] || {};
            const p2 = pump2[i] || {};

            worksheet.addRow([
                p1.date || '',
                p1.pos || '',
                p1.amount || '',

                '',

                p2.date || '',
                p2.pos || '',
                p2.amount || ''
            ]);
        }

        worksheet.eachRow((row) => {
            const separatorCell = row.getCell(4);

            separatorCell.fill = {
                type: 'pattern',
                pattern: 'solid',
                fgColor: { argb: 'FF000000' }
            };
        });

        worksheet.getRow(1).font = { bold: true };

        const buffer = await workbook.xlsx.writeBuffer();

        saveAs(
            new Blob([buffer], {
                type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
            }),
            file.name.replace('.csv', '_side_by_side.xlsx')
        );
    };

    reader.readAsText(file);
}
</script>

</body>
</html>
